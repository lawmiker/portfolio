<div class="menu-container">

  <div class="menu-panel">

    <div class="header">
    <h1 class="logo">Main Menu</h1>
    <img src="assets/ui/separator.svg" alt="" class="deco">
    </div>

    <nav>
      <a
        *ngFor="let item of navItems; let i = index"
        [routerLink]="item.link"
        routerLinkActive="is-active"
        [routerLinkActiveOptions]="{ exact: true }"
        class="nav-link"
        [class.is-tapped]="tappedIndex === i"
        (click)="markTapped(i)"
      >
        <span class="nav-bg"></span>
        <span class="nav-bullet"></span>
        <span class="nav-text">{{ item.label }}</span>
      </a>
    </nav>
  </div>

  <div class="bg-info">
    <span class="bg-text" (mouseenter)="mouseEnter()" (mouseleave)="mouseLeave()" (click)="onTextClick($event)">Background Info</span>
    <div class="popup" *ngIf="isVisible">
      <img src="assets/ui/bg-info.svg"/>
    </div>
  </div>

</div>
